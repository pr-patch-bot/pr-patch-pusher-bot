github:
  auth:
    type: bot_token
    token_env: GITHUB_TOKEN
  bot_username: bridgedburden

codeberg:
  base_url: https://codeberg.org
  auth:
    token_env: CODEBERG_TOKEN
  webhook:
    secret_env: CODEBERG_WEBHOOK_SECRET

storage:
  sqlite_path: ./data/database.sqlite

git:
  working_directory: ./repos

mirrors:
  - name: monero
    github_repo: plowsof/monero
    codeberg_repo: montero-project/monero
    allowed_codeberg_users:
      - plowsof
    # GitHub branch name for "mainline" tasks like sync_upstream_to_codeberg (and as a fallback).
    base_branch: master
    branch_prefix: codeberg-pr
    # Optional:
    # codeberg_base_branch: master
    # sync_upstream_to_codeberg_interval: 8h
    # reconcile_github_to_codeberg_interval: 8h
    # backfill_codeberg_open_prs_interval: 8h
    # mirror_comments_interval: 2m
